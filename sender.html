<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Sender</title>
</head>
<body>
  <h2>Halaman Pengirim</h2>

  <input type="text" id="messageInput" placeholder="Tulis pesan...">
  <button onclick="sendMessage()">Kirim</button>

  <br><br>
  <iframe id="receiverFrame" src="receiver.html" width="400" height="200"></iframe>

  <script>
    function sendMessage() {
      const message = document.getElementById("messageInput").value;
      const iframe = document.getElementById("receiverFrame");

      iframe.contentWindow.postMessage(message, "*");
    }
  </script>
</body>
</html>
