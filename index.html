<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Images Slide Show</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>
<div class="container">
<h1 style="text-align: center;">Carousel</h1>
<p>"Carousel" adalah sebuah tehnik membuat file gambar yang otomatis slide seperti pada website yang sering kita lihat, seperti 
    contoh di bawah ini.
</p>

<!-- membuat carousel -->
<div id="demo" class="carousel slide" data-bs-ride="carousel">
<!-- indicator carousel / dot di bawah gambar -->
 <div class="carousel-indicators">
    <button type="button" data-bs-target="#demo" data-bs-slide-to="0" class="active"></button>
    <button type="button" data-bs-target="#demo" data-bs-slide-to="1"></button>
    <button type="button" data-bs-target="#demo" data-bs-slide-to="2"></button>
    <button type="button" data-bs-target="#demo" data-bs-slide-to="3"></button>
    <button type="button" data-bs-target="#demo" data-bs-slide-to="4"></button>
    <button type="button" data-bs-target="#demo" data-bs-slide-to="5"></button>
 </div>
 <!-- slide show carousel -->
 <div class="carousel-inner">
    <div class="carousel-item active">
        <img src="ojan.jpg" class="d-block active" style="width: 100%;"/>
    </div>
    <div class="carousel-item">
        <img src="satu.png" class="d-block" style="width: 100%;"/>
    </div>
    <div class="carousel-item">
        <img src="kuburan.jpg" class="d-block" style="width: 100%;"/>
    </div>
    <div class="carousel-item">
        <img src="dua.jpg" class="d-block" style="width: 100%;"/>
    </div>
    <div class="carousel-item">
        <img src="jiaroh.jpg" class="d-block" style="width: 100%;"/>
    </div>
    <div class="carousel-item">
        <img src="empat.jpg" class="d-block" style="width: 100%;"/>
    </div>
 </div>
 <!-- left and right controls -->
 <button class="carousel-control-prev" type="button" data-bs-target="#demo" data-bs-slide="prev">
    <span class="carousel-control-prev-icon"></span>
 </button>
 <button class="carousel-control-next" type="button" data-bs-target="#demo" data-bs-slide="next">
    <span class="carousel-control-next-icon"></span>
 </button>
</div>
</div>



</body>
</html>
